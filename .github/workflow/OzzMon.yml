name: Continuous Recon (Public Version)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recon:
    runs-on: ubuntu-latest

    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      GOPATH: /home/runner/go

    steps:

      # ── Checkout ─────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Dependencies ─────────
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl git

      - name: Install Go Tools
        run: |
          for tool in \
            "github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest" \
            "github.com/projectdiscovery/httpx/cmd/httpx@latest" \
            "github.com/projectdiscovery/dnsx/cmd/dnsx@latest"; do
            go install "$tool"
          done
          echo "$GOPATH/bin" >> $GITHUB_PATH

      # ── Prepare Workspace ────────────
      - name: Prepare Workspace
        run: |
          mkdir -p recon
          [ -f recon/subs.txt ] && cp recon/subs.txt recon/old_subs.txt || touch recon/old_subs.txt
          touch recon/subs.txt

      # ── Load Targets ─────────────────
      - name: Load Targets
        run: |
          grep -v '^\s*#' targets/domains.txt | grep -v '^\s*$' > domains.txt

      # ── Subdomain Discovery ──────────
      - name: Discover Subdomains
        run: |
          while read domain; do
            subfinder -d "$domain" -silent >> recon/subs.txt || true
          done < domains.txt

          sort -u recon/subs.txt -o recon/subs.txt

      # ── Resolve & Probe ──────────────
      - name: Probe Services
        run: |
          dnsx -l recon/subs.txt -silent > recon/resolved.txt || true

          httpx -l recon/resolved.txt \
            -status-code -title \
            -silent \
            -o recon/live.txt || true

      # ── Detect New Assets ────────────
      - name: Detect New Subdomains
        run: |
          sort recon/old_subs.txt > old.txt
          sort recon/subs.txt > new.txt
          comm -13 old.txt new.txt > recon/new_subs.txt || true

      # ── Alert ───────────────────────
      - name: Send Alerts
        run: |
          if [ ! -s recon/new_subs.txt ] || [ -z "$DISCORD_WEBHOOK" ]; then
            exit 0
          fi

          MSG=$(jq -n \
            --arg content "New subdomains discovered:\n$(cat recon/new_subs.txt | head -20)" \
            '{content: $content}')

          curl -s -X POST -H "Content-Type: application/json" \
            -d "$MSG" "$DISCORD_WEBHOOK" || true

      # ── Save State ──────────────────
      - name: Save State
        run: |
          mkdir -p recon
          cp recon/subs.txt recon/old_subs.txt

      - name: Commit Results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add recon/
          git commit -m "Update recon data" || true
          git push || true
